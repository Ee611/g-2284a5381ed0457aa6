<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>今天也要开心哦</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #fff8f3;
        --ink: #27222a;
        --ribbon: #e94c67;
        --box: #ffcc4d;
        --box-dark: #edae35;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 24% 18%, rgba(255, 229, 185, 0.9), transparent 30%),
          radial-gradient(circle at 80% 78%, rgba(255, 177, 183, 0.75), transparent 34%),
          linear-gradient(145deg, #fffaf2 0%, #ffe8df 48%, #e9f3ff 100%);
        color: var(--ink);
        font-family: ui-rounded, "Microsoft YaHei UI", "Microsoft YaHei", system-ui, sans-serif;
      }

      .stage {
        width: min(86vw, 420px);
        min-height: 560px;
        display: grid;
        place-items: center;
        position: relative;
      }

      .gift-wrap {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        animation: leave 0.55s ease-in 1.7s forwards;
      }

      .gift {
        width: 150px;
        height: 132px;
        position: relative;
        animation: bounce 0.72s cubic-bezier(.2, .75, .34, 1.2) 0.1s both;
      }

      .lid {
        position: absolute;
        width: 170px;
        height: 38px;
        left: -10px;
        top: 8px;
        border-radius: 8px;
        background: var(--box);
        box-shadow: inset 0 -8px 0 rgba(0, 0, 0, 0.08);
        animation: lidOpen 0.62s cubic-bezier(.2, .8, .28, 1.15) 0.95s forwards;
        transform-origin: 16px 36px;
        z-index: 3;
      }

      .box {
        position: absolute;
        width: 150px;
        height: 100px;
        left: 0;
        top: 42px;
        border-radius: 8px 8px 14px 14px;
        background: linear-gradient(180deg, var(--box), var(--box-dark));
        box-shadow: 0 18px 34px rgba(69, 41, 20, 0.18), inset 0 -9px 0 rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .box::before,
      .lid::before {
        content: "";
        position: absolute;
        left: 60px;
        top: 0;
        width: 30px;
        height: 100%;
        background: var(--ribbon);
      }

      .bow,
      .bow::before,
      .bow::after {
        position: absolute;
        background: var(--ribbon);
      }

      .bow {
        left: 61px;
        top: -14px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        z-index: 4;
        animation: lidOpen 0.62s cubic-bezier(.2, .8, .28, 1.15) 0.95s forwards;
        transform-origin: 14px 50px;
      }

      .bow::before,
      .bow::after {
        content: "";
        top: 4px;
        width: 48px;
        height: 28px;
        border-radius: 28px 28px 8px 28px;
      }

      .bow::before {
        right: 18px;
        transform: rotate(-18deg);
      }

      .bow::after {
        left: 18px;
        border-radius: 28px 28px 28px 8px;
        transform: rotate(18deg);
      }

      .spark {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #fff;
        opacity: 0;
        box-shadow: 0 0 18px rgba(255, 255, 255, 0.95);
        animation: spark 0.8s ease-out 1.08s forwards;
      }

      .spark:nth-child(2) {
        --x: -108px;
        --y: -94px;
      }

      .spark:nth-child(3) {
        --x: 98px;
        --y: -86px;
      }

      .spark:nth-child(4) {
        --x: -82px;
        --y: 72px;
      }

      .spark:nth-child(5) {
        --x: 112px;
        --y: 58px;
      }

      .surprise {
        width: min(78vw, 360px);
        margin: 0;
        border-radius: 18px;
        overflow: hidden;
        opacity: 0;
        transform: translateY(18px) scale(0.92) rotate(-1.5deg);
        box-shadow: 0 24px 54px rgba(61, 37, 44, 0.2);
        animation: reveal 0.62s cubic-bezier(.18, .89, .26, 1.22) 1.82s forwards;
      }

      .surprise img {
        display: block;
        width: 100%;
        height: auto;
      }

      .surprise img.is-photo {
        max-height: min(78vh, 640px);
        object-fit: contain;
        background: #fff;
      }

      @keyframes bounce {
        0% { transform: translateY(42px) scale(0.82); opacity: 0; }
        68% { transform: translateY(-8px) scale(1.04); opacity: 1; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }

      @keyframes lidOpen {
        0% { transform: translate(0, 0) rotate(0deg); }
        100% { transform: translate(-36px, -72px) rotate(-24deg); }
      }

      @keyframes spark {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
        40% { opacity: 1; }
        100% { opacity: 0; transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0.1); }
      }

      @keyframes leave {
        to { opacity: 0; transform: scale(0.96); pointer-events: none; }
      }

      @keyframes reveal {
        to { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      }

      @media (max-width: 600px) {
        body {
          min-height: 100svh;
          padding: 0;
        }

        .stage {
          width: 100vw;
          min-height: 100svh;
          padding: 22px 0 28px;
          justify-items: center;
        }

        .surprise {
          width: min(76vw, 320px);
          justify-self: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="今日小礼物">
      <div class="gift-wrap" aria-hidden="true">
        <div class="gift">
          <div class="spark"></div>
          <div class="spark"></div>
          <div class="spark"></div>
          <div class="spark"></div>
          <div class="lid"></div>
          <div class="bow"></div>
          <div class="box"></div>
        </div>
      </div>
      <figure class="surprise">
        <img src="./assets/wink.gif?v=20260528" alt="今天也要开心哦">
      </figure>
    </main>
    <script>
      const surpriseImage = document.querySelector(".surprise img");

      async function loadTodayPhoto() {
        try {
          const response = await fetch("./daily-photos/manifest.json?v=" + Date.now(), {
            cache: "no-store"
          });

          if (!response.ok) {
            return;
          }

          const manifest = await response.json();
          const latest = Array.isArray(manifest.photos) ? manifest.photos[0] : undefined;

          if (!latest?.path) {
            return;
          }

          surpriseImage.src = latest.path + "?v=" + encodeURIComponent(latest.version || Date.now());
          surpriseImage.alt = latest.alt || "今天的照片";
          surpriseImage.classList.add("is-photo");
        } catch {
          surpriseImage.src = "./assets/wink.gif?v=20260528";
        }
      }

      loadTodayPhoto();
    </script>
  </body>
</html>
